<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>论文摘要助手 · 发布会样片</title>
<style>
  :root{
    --bg:#07070b; --bg2:#0d0d16; --ink:#f4f3f8; --muted:#9b98b3;
    --p1:#7F77DD; --p2:#b06ab3; --p3:#5DCAA5; --line:rgba(255,255,255,.08);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  .snap{scroll-snap-type:y proximity}
  section{
    min-height:100vh; display:flex; flex-direction:column; justify-content:center;
    align-items:center; padding:7vh 8vw; position:relative; scroll-snap-align:start;
    text-align:center;
  }
  .grad{
    background:linear-gradient(100deg,var(--p1),var(--p2) 55%,var(--p3));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .reveal{opacity:0; transform:translateY(34px); transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1)}
  .reveal.in{opacity:1; transform:none}
  .d1{transition-delay:.08s}.d2{transition-delay:.20s}.d3{transition-delay:.32s}.d4{transition-delay:.44s}

  /* ---------- Hero ---------- */
  #hero{background:radial-gradient(1100px 620px at 50% 18%,rgba(127,119,221,.22),transparent 60%),var(--bg)}
  .eyebrow{font-size:clamp(12px,1.4vw,15px); letter-spacing:.32em; color:var(--muted); text-transform:uppercase; margin-bottom:26px}
  #hero h1{font-size:clamp(44px,9vw,118px); font-weight:600; line-height:1.02; letter-spacing:-.02em}
  #hero .sub{font-size:clamp(17px,2.4vw,27px); color:var(--muted); font-weight:300; margin-top:30px; max-width:760px; line-height:1.6}
  .pills{display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:40px}
  .pill{border:1px solid var(--line); color:#cfccdf; font-size:14px; padding:9px 18px; border-radius:999px; background:rgba(255,255,255,.03)}
  .scrollhint{position:absolute; bottom:42px; color:var(--muted); font-size:13px; letter-spacing:.18em; animation:bob 1.8s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(8px);opacity:1}}

  /* ---------- Pipeline ---------- */
  #flow .cap{font-size:clamp(13px,1.6vw,16px); letter-spacing:.2em; color:var(--muted); text-transform:uppercase; margin-bottom:14px}
  #flow h2{font-size:clamp(30px,5vw,60px); font-weight:600; letter-spacing:-.01em; margin-bottom:64px}
  .pipe{display:flex; align-items:center; gap:0; flex-wrap:wrap; justify-content:center}
  .node{
    width:172px; height:172px; border-radius:24px; border:1px solid var(--line);
    background:var(--bg2); display:flex; flex-direction:column; justify-content:center; gap:10px;
    opacity:.32; transform:scale(.94); transition:all .6s cubic-bezier(.2,.7,.2,1); position:relative;
  }
  .node.lit{opacity:1; transform:none; border-color:rgba(127,119,221,.6); box-shadow:0 0 0 1px rgba(127,119,221,.35),0 24px 60px -28px rgba(127,119,221,.8)}
  .node .ic{font-size:34px}
  .node .nm{font-size:18px; font-weight:500}
  .node .sm{font-size:12.5px; color:var(--muted)}
  .conn{width:46px; height:2px; background:var(--line); position:relative; overflow:hidden}
  .conn::after{content:""; position:absolute; inset:0; width:0; background:linear-gradient(90deg,var(--p1),var(--p3)); transition:width .5s ease}
  .conn.lit::after{width:100%}
  @media(max-width:760px){.conn{width:2px;height:34px;transform:rotate(90deg)}}

  /* ---------- Metrics ---------- */
  #perf{background:linear-gradient(180deg,var(--bg),#0a0912)}
  #perf .cap{font-size:clamp(13px,1.6vw,16px); letter-spacing:.2em; color:var(--muted); text-transform:uppercase; margin-bottom:14px}
  #perf h2{font-size:clamp(30px,5vw,60px); font-weight:600; margin-bottom:18px}
  #perf .lead{color:var(--muted); font-weight:300; font-size:clamp(16px,2vw,21px); max-width:720px; margin-bottom:64px; line-height:1.6}
  .stats{display:flex; gap:clamp(24px,6vw,96px); flex-wrap:wrap; justify-content:center; align-items:flex-end}
  .stat .big{font-size:clamp(52px,9vw,104px); font-weight:600; line-height:1; letter-spacing:-.03em}
  .stat .lbl{margin-top:16px; color:var(--muted); font-size:15px}
  .arrowbig{font-size:clamp(34px,5vw,60px); color:var(--muted); font-weight:200; padding-bottom:20px}
</style>
</head>
<body class="snap">

  <section id="hero">
    <div class="eyebrow reveal in">AI Paper Reader</div>
    <h1 class="reveal in d1">读论文，<span class="grad">从一下午到一分钟</span></h1>
    <p class="sub reveal in d2">输入一个关键词，自动检索 · 解析 · 摘要 · 生成思维导图。<br>一站式论文速读系统。</p>
    <div class="pills reveal in d3">
      <span class="pill">arXiv 检索</span>
      <span class="pill">MinerU 解析</span>
      <span class="pill">DeepSeek 摘要</span>
      <span class="pill">思维导图</span>
    </div>
    <div class="scrollhint">向下滚动 ↓</div>
  </section>

  <section id="flow">
    <div class="cap reveal">工作流</div>
    <h2 class="reveal d1">四步，全自动</h2>
    <div class="pipe">
      <div class="node" data-step><div class="ic grad">🔍</div><div class="nm">检索</div><div class="sm">arXiv 找论文</div></div>
      <div class="conn" data-conn></div>
      <div class="node" data-step><div class="ic grad">📄</div><div class="nm">解析</div><div class="sm">PDF → 结构化</div></div>
      <div class="conn" data-conn></div>
      <div class="node" data-step><div class="ic grad">🧠</div><div class="nm">摘要</div><div class="sm">Map-Reduce</div></div>
      <div class="conn" data-conn></div>
      <div class="node" data-step><div class="ic grad">✨</div><div class="nm">展示</div><div class="sm">5 视图 + 导图</div></div>
    </div>
  </section>

  <section id="perf">
    <div class="cap reveal">性能</div>
    <h2 class="reveal d1">三层缓存，<span class="grad">算过不重算</span></h2>
    <p class="lead reveal d2">检索、解析、摘要每层都落盘缓存。冷启动慢，热启动近乎瞬时。</p>
    <div class="stats">
      <div class="stat reveal d2"><div class="big grad" data-count="9" data-suffix=" min">0 min</div><div class="lbl">冷启动 · 3 篇论文</div></div>
      <div class="arrowbig reveal d3">→</div>
      <div class="stat reveal d3"><div class="big grad" data-count="0.4" data-suffix=" s" data-dec="1">0 s</div><div class="lbl">热启动 · 命中缓存</div></div>
    </div>
  </section>

<script>
  const io=new IntersectionObserver((es)=>{
    es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });
  },{threshold:.25});
  document.querySelectorAll('.reveal:not(.in)').forEach(el=>io.observe(el));

  const flow=document.getElementById('flow');
  const fio=new IntersectionObserver((es)=>{
    es.forEach(e=>{ if(!e.isIntersecting) return;
      const nodes=flow.querySelectorAll('[data-step]'), conns=flow.querySelectorAll('[data-conn]');
      nodes.forEach((n,i)=>setTimeout(()=>{ n.classList.add('lit'); if(conns[i-1])conns[i-1].classList.add('lit'); }, 260*i+200));
      fio.unobserve(e.target);
    });
  },{threshold:.4});
  fio.observe(flow);

  const cio=new IntersectionObserver((es)=>{
    es.forEach(e=>{ if(!e.isIntersecting) return;
      const dec=+e.target.dataset.dec||0, end=+e.target.dataset.count, suf=e.target.dataset.suffix||"";
      const t0=performance.now(), dur=1100;
      const tick=(t)=>{ let p=Math.min((t-t0)/dur,1); p=1-Math.pow(1-p,3);
        e.target.textContent=(end*p).toFixed(dec)+suf;
        if(p<1)requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick); cio.unobserve(e.target);
    });
  },{threshold:.6});
  document.querySelectorAll('[data-count]').forEach(el=>cio.observe(el));
</script>
</body>
</html>
